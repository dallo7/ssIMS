name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff
      - name: Ruff check
        run: ruff check .

  smoke:
    name: Import + WSGI smoke
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Force SQLite fallback so the smoke test does not need Postgres.
      CPI_SQLITE_PATH: ${{ runner.temp }}/cpi_inventory.sqlite
      # Dev env -> no production secret validation; default dev secret is fine.
      CPI_ENV: development
      # Skip alert evaluation on boot so the smoke test is deterministic.
      CPI_ALERT_EVAL_ON_START: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Import app (schema init + WSGI callable resolves)
        run: |
          python - <<'PY'
          import wsgi
          assert callable(wsgi.application), "WSGI application must be callable"
          print("OK: wsgi.application is", type(wsgi.application).__name__)
          PY

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: cpi-inventory:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
